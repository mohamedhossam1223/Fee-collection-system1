<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle Vision | نظام الإدارة المالية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div id="loginScreen" class="auth-container">
        <div class="auth-card">
            <div class="auth-logo"><i class="fas fa-user-shield"></i></div>
            <h2>تسجيل دخول الإدارة</h2>
            <div class="auth-inputs">
                <input type="text" id="adminUser" placeholder="اسم المستخدم (admin)">
                <input type="password" id="adminPass" placeholder="كلمة المرور (123)">
            </div>
            <button onclick="login()" class="login-btn">دخول للنظام</button>
        </div>
    </div>

    <div id="mainDashboard" class="dashboard-container hidden">
        <header class="main-header">
            <div class="top-bar">
                <span id="welcomeMsg"></span>
                <button onclick="logout()" class="logout-btn"><i class="fas fa-power-off"></i></button>
            </div>
            <h1>إدارة تحصيل الاشتراكات</h1>
        </header>

        <div class="stats-container">
            <div class="stat-box gold">
                <i class="fas fa-money-bill-trend-up"></i>
                <div class="stat-text"><span id="totalMoney">0</span><label>إجمالي المحصل</label></div>
            </div>
            <div class="stat-box blue">
                <i class="fas fa-users"></i>
                <div class="stat-text"><span id="studentCount">0</span><label>عدد الطلاب</label></div>
            </div>
        </div>

        <div class="action-panel no-print">
            <div class="add-section">
                <input type="text" id="studentName" placeholder="اسم الطالب الجديد...">
                <input type="number" id="amount" placeholder="المبلغ">
                <button onclick="addStudent()" class="btn-primary"><i class="fas fa-plus"></i></button>
            </div>
            
            <div class="filter-tabs">
                <button class="tab active" onclick="filterData('all', this)">الكل</button>
                <button class="tab" onclick="filterData('paid', this)">تم الدفع</button>
                <button class="tab" onclick="filterData('unpaid', this)">لم يدفع</button>
            </div>

            <div class="search-export">
                <input type="text" id="searchInput" placeholder="بحث بالاسم..." oninput="render()">
                <button onclick="downloadPDF()" class="btn-pdf"><i class="fas fa-file-pdf"></i> تقرير PDF</button>
            </div>
        </div>

        <div id="printArea">
            <ul id="studentList" class="data-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
