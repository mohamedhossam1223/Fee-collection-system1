<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Vision | Financial System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="cursor"></div>

    <div id="loginScreen" class="container auth-view">
        <div class="auth-card">
            <h1>Eagle Vision</h1>
            <div class="input-group">
                <input type="text" id="adminUser" placeholder="اسم المستخدم">
                <input type="password" id="adminPass" placeholder="كلمة المرور">
            </div>
            <button onclick="login()" class="cta-button">دخول للنظام</button>
        </div>
    </div>

    <div id="mainDashboard" class="container dashboard-view hidden">
        <header>
            <div class="top-nav">
                <span id="welcomeMsg"></span>
                <button onclick="logout()" class="logout-icon"><i class="fas fa-power-off"></i></button>
            </div>
            <h2>إدارة التحصيل</h2>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span id="totalMoney">0</span>
                <label>المحصل</label>
            </div>
            <div class="stat-card">
                <span id="studentCount">0</span>
                <label>الطلاب</label>
            </div>
        </div>

        <div class="action-panel">
            <div class="form-row">
                <input type="text" id="studentName" placeholder="اسم الطالب">
                <input type="number" id="amount" placeholder="المبلغ">
                <button onclick="addStudent()" class="mini-cta">+</button>
            </div>
            
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterData('all', this)">الكل</button>
                <button class="filter-btn" onclick="filterData('paid', this)">دفع</button>
                <button class="filter-btn" onclick="filterData('unpaid', this)">باقي</button>
                <button onclick="downloadPDF()" class="pdf-icon"><i class="fas fa-file-pdf"></i></button>
            </div>
            <input type="text" id="searchInput" placeholder="بحث سريع..." oninput="render()">
        </div>

        <div id="printArea">
            <ul id="studentList"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
